<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plant Engineering Total Service System</title>
<style>
  :root{
    --bg:#0b0e14; --bg2:#11151f; --panel:#151b27; --panel2:#1b2230;
    --line:#252d3d; --line2:#313b50;
    --txt:#e6ebf2; --txt2:#9aa6bb; --txt3:#5f6b82;
    --accent:#38e1c0; --accent2:#5b8cff; --accent3:#ffb454;
    --danger:#ff6b6b; --ok:#3ddc97;
    --radius:14px; --shadow:0 8px 30px rgba(0,0,0,.45);
    --mono:"Consolas","SFMono-Regular",ui-monospace,monospace;
    --sans:"Pretendard","Segoe UI","Malgun Gothic",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 600px at 80% -10%,#16203a 0%,transparent 60%),
               radial-gradient(900px 500px at -10% 10%,#10241f 0%,transparent 55%),
               var(--bg);
    color:var(--txt); font-family:var(--sans); font-size:14px; line-height:1.5;
    min-height:100vh;
  }
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:#04140f}

  /* ===== layout ===== */
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  /* sidebar */
  .side{
    background:linear-gradient(180deg,var(--bg2),var(--bg));
    border-right:1px solid var(--line); padding:22px 16px;
    position:sticky; top:0; height:100vh; overflow:auto;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:4px 6px 18px}
  .logo{
    width:38px;height:38px;border-radius:11px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-weight:800;color:#06130f;font-size:17px;
    box-shadow:0 4px 16px rgba(56,225,192,.35);
  }
  .brand b{font-size:15px;letter-spacing:.3px}
  .brand span{display:block;font-size:11px;color:var(--txt3);font-weight:500;letter-spacing:.4px}
  .navlbl{font-size:10.5px;letter-spacing:1.2px;color:var(--txt3);text-transform:uppercase;margin:18px 8px 8px;font-weight:700}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav a{
    display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;
    color:var(--txt2);font-weight:600;font-size:13px;cursor:pointer;transition:.15s;
    border:1px solid transparent;
  }
  .nav a .ic{width:18px;text-align:center;font-size:14px;opacity:.9}
  .nav a .cnt{margin-left:auto;font-size:11px;color:var(--txt3);font-family:var(--mono)}
  .nav a:hover{background:var(--panel);color:var(--txt)}
  .nav a.active{background:linear-gradient(90deg,rgba(56,225,192,.16),rgba(91,140,255,.10));
    color:#fff;border-color:var(--line2)}
  .nav a.active .cnt{color:var(--accent)}
  .side-foot{margin-top:18px;padding:12px 10px;border-top:1px solid var(--line);font-size:11px;color:var(--txt3)}
  .side-foot b{color:var(--txt2)}
  .weblink{margin-top:22px;padding:14px 12px;border:1px solid var(--line2);border-radius:12px;
    background:linear-gradient(180deg,var(--panel),var(--panel2));text-align:center}
  .wl-h{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;margin-bottom:8px}
  .wl-url{display:block;font-size:11px;font-family:var(--mono);color:var(--txt2);word-break:break-all;
    margin-bottom:9px;line-height:1.4}
  .wl-url:hover{color:var(--accent)}
  .wl-row{display:flex;gap:6px;margin-bottom:11px}
  .wl-btn{flex:1;font-size:11px;font-weight:700;padding:7px 0;border-radius:8px;cursor:pointer;
    background:var(--bg);border:1px solid var(--line2);color:var(--txt);text-align:center;transition:.13s}
  .wl-btn:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06130f;border-color:transparent}
  .wl-qr{width:130px;height:130px;border-radius:9px;background:var(--panel);display:block;margin:0 auto;
    border:1px solid var(--line)}
  .wl-sub{font-size:10px;color:var(--txt3);margin-top:8px;line-height:1.4}

  /* main */
  .main{padding:26px 34px 60px;max-width:1500px}
  .topbar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px}
  .hello h1{margin:0;font-size:25px;letter-spacing:.4px;font-weight:800;
    background:linear-gradient(90deg,#eaf2ff,var(--accent) 120%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hello p{margin:3px 0 0;color:var(--txt2);font-size:13px}
  .spacer{flex:1}
  .search{
    position:relative;min-width:300px;
  }
  .search input{
    width:100%;padding:11px 14px 11px 38px;border-radius:11px;
    background:var(--panel);border:1px solid var(--line);color:var(--txt);
    font-size:13px;outline:none;transition:.15s;
  }
  .search input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(91,140,255,.15)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5}
  .userchip{display:flex;align-items:center;gap:9px;padding:7px 12px 7px 8px;background:var(--panel);
    border:1px solid var(--line);border-radius:30px}
  .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ffb454,#ff6b6b);
    display:grid;place-items:center;font-weight:800;color:#1a0d00;font-size:12px}
  .userchip small{color:var(--txt3);display:block;font-size:10px}

  /* stat row */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0 26px}
  .stat{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;
  }
  .stat::after{content:"";position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;
    background:radial-gradient(circle,rgba(56,225,192,.18),transparent 70%)}
  .stat .k{font-size:11px;color:var(--txt3);letter-spacing:.5px;font-weight:700;text-transform:uppercase}
  .stat .v{font-size:28px;font-weight:800;margin-top:6px;font-family:var(--mono)}
  .stat .v small{font-size:13px;color:var(--txt2);font-weight:600}
  .stat .d{font-size:11.5px;color:var(--txt2);margin-top:4px}
  .stat:nth-child(2)::after{background:radial-gradient(circle,rgba(91,140,255,.18),transparent 70%)}
  .stat:nth-child(3)::after{background:radial-gradient(circle,rgba(255,180,84,.18),transparent 70%)}
  .stat:nth-child(4)::after{background:radial-gradient(circle,rgba(61,220,151,.18),transparent 70%)}

  /* section */
  .sec{margin-bottom:34px}
  .sec-h{display:flex;align-items:center;gap:11px;margin:0 0 14px}
  .sec-h .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .sec-h h2{margin:0;font-size:16px;letter-spacing:.2px}
  .sec-h .tag{font-size:11px;color:var(--txt3);font-family:var(--mono);border:1px solid var(--line);
    padding:2px 8px;border-radius:20px}
  .sec-h .line{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .card{
    background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:var(--radius);padding:18px;
    cursor:pointer;transition:.18s;position:relative;display:flex;flex-direction:column;gap:12px;
    min-height:172px;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--line2);box-shadow:var(--shadow)}
  .card:hover .run{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06130f;border-color:transparent}
  .card-top{display:flex;align-items:flex-start;gap:13px}
  .cico{
    width:46px;height:46px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-size:22px;
    background:var(--bg);border:1px solid var(--line2);
  }
  .card h3{margin:0;font-size:15px;letter-spacing:.2px}
  .card .sub{font-size:11.5px;color:var(--txt3);font-family:var(--mono);margin-top:2px}
  .badge{margin-left:auto;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;
    border:1px solid transparent}
  .b-run{background:rgba(61,220,151,.12);color:var(--ok);border-color:rgba(61,220,151,.3)}
  .b-dev{background:rgba(255,180,84,.12);color:var(--accent3);border-color:rgba(255,180,84,.3)}
  .b-lab{background:rgba(91,140,255,.12);color:var(--accent2);border-color:rgba(91,140,255,.3)}
  .card .desc{font-size:12.5px;color:var(--txt2);line-height:1.55;flex:1}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:10.5px;color:var(--txt2);background:var(--bg);border:1px solid var(--line);
    padding:3px 8px;border-radius:7px;font-family:var(--mono)}
  .card-foot{display:flex;align-items:center;gap:10px;margin-top:2px}
  .scount{font-size:11.5px;color:var(--txt3);font-family:var(--mono);display:flex;align-items:center;gap:6px}
  .oneclick-tag{font-size:10px;font-weight:700;color:var(--accent3);background:rgba(255,180,84,.12);
    border:1px solid rgba(255,180,84,.3);padding:2px 8px;border-radius:20px}
  .run{margin-left:auto;font-size:12px;font-weight:700;padding:7px 16px;border-radius:9px;
    background:var(--bg);border:1px solid var(--line2);color:var(--txt);transition:.15s}

  .empty{padding:60px 20px;text-align:center;color:var(--txt3);display:none}
  .empty.show{display:block}

  /* modal */
  .ov{position:fixed;inset:0;background:rgba(4,7,12,.72);backdrop-filter:blur(4px);
    display:none;place-items:center;z-index:50;padding:24px}
  .ov.show{display:grid}
  .modal{width:min(560px,100%);background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line2);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;
    animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .m-h{padding:22px 24px;display:flex;align-items:flex-start;gap:14px;border-bottom:1px solid var(--line)}
  .m-h .cico{width:54px;height:54px;font-size:26px}
  .m-h h3{margin:0;font-size:18px}
  .m-h .sub{font-size:12px;color:var(--txt3);font-family:var(--mono);margin-top:3px}
  .m-x{margin-left:auto;background:var(--bg);border:1px solid var(--line);color:var(--txt2);
    width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:16px;line-height:1}
  .m-x:hover{color:#fff;border-color:var(--line2)}
  .m-b{padding:22px 24px;display:flex;flex-direction:column;gap:16px}
  .m-b p{margin:0;color:var(--txt2);font-size:13px;line-height:1.6}
  .m-row{display:flex;gap:10px;flex-wrap:wrap}
  .m-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .m-meta div{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .m-meta .k{font-size:10.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .m-meta .v{font-size:14px;margin-top:3px;font-family:var(--mono)}
  .m-sub-h{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;
    margin-top:4px}
  .m-sub-h span{color:var(--accent);font-family:var(--mono)}
  .oneclick{font-size:12px;color:var(--txt2);background:rgba(255,180,84,.08);border:1px solid rgba(255,180,84,.25);
    border-radius:10px;padding:9px 12px;line-height:1.5}
  .filelist{max-height:280px;overflow:auto;border:1px solid var(--line);border-radius:11px;background:var(--bg)}
  .filelist::-webkit-scrollbar{width:10px}
  .filelist::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px;border:2px solid var(--bg)}
  .floading{padding:18px;color:var(--txt3);font-size:12.5px;line-height:1.6;text-align:center}
  .floading b{color:var(--accent)}
  .fgroup{padding:8px 14px 4px;font-size:11px;color:var(--accent2);font-family:var(--mono);
    background:var(--bg2);border-top:1px solid var(--line);position:sticky;top:0}
  .frow{display:flex;align-items:center;gap:10px;padding:8px 12px;border-top:1px solid var(--line)}
  .frow:hover{background:var(--panel)}
  .fname{font-family:var(--mono);font-size:12px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;flex:1}
  .frun{flex:0 0 auto;font-size:11px;font-weight:700;padding:6px 13px;border-radius:8px;cursor:pointer;
    background:var(--bg2);border:1px solid var(--line2);color:var(--txt);transition:.13s}
  .frun:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06130f;border-color:transparent}
  .frun:disabled{opacity:.6;cursor:default}
  .viewtag{flex:0 0 auto;font-size:10px;font-weight:700;color:var(--accent2);background:rgba(91,140,255,.12);
    border:1px solid rgba(91,140,255,.3);padding:4px 10px;border-radius:8px}
  .viewonly-chip{font-size:11px;font-weight:700;color:var(--accent2);background:rgba(91,140,255,.12);
    border:1px solid rgba(91,140,255,.3);padding:6px 12px;border-radius:20px;white-space:nowrap}
  .m-f{padding:16px 24px 22px;display:flex;gap:10px}
  .btn{flex:1;padding:12px;border-radius:11px;font-weight:700;font-size:13px;cursor:pointer;border:1px solid var(--line2);
    background:var(--bg);color:var(--txt);transition:.15s}
  .btn:hover{border-color:var(--line2);background:var(--panel)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06130f;border-color:transparent}
  .btn.primary:hover{filter:brightness(1.07)}
  .note{font-size:11px;color:var(--txt3);text-align:center;padding:0 24px 18px;margin-top:-6px}

  /* toast */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel2);border:1px solid var(--line2);color:var(--txt);padding:12px 20px;border-radius:12px;
    box-shadow:var(--shadow);font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:60;display:flex;gap:9px;align-items:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .d{width:8px;height:8px;border-radius:50%;background:var(--accent3)}

  @media(max-width:880px){
    .app{grid-template-columns:1fr}
    .side{display:none}
    .stats{grid-template-columns:repeat(2,1fr)}
    .main{padding:20px 18px 50px}
  }
</style>
</head>
<body>
<div class="app">
  <!-- ===== SIDEBAR ===== -->
  <aside class="side">
    <div class="brand">
      <div class="logo">A</div>
      <div><b>ACE Automation</b><span>Plant Engineering Tools</span></div>
    </div>
    <div class="navlbl">카테고리</div>
    <nav class="nav" id="nav"></nav>
    <div class="weblink">
      <div class="wl-h">📱 모바일 · 웹 링크</div>
      <a class="wl-url" href="https://jjj4107.github.io/ace-launcher/" target="_blank" rel="noopener">jjj4107.github.io/ace-launcher</a>
      <div class="wl-row">
        <button class="wl-btn" id="wl-copy">링크 복사</button>
        <a class="wl-btn" href="https://jjj4107.github.io/ace-launcher/" target="_blank" rel="noopener">열기 ↗</a>
      </div>
      <img class="wl-qr" alt="QR 코드" loading="lazy"
           src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&margin=0&bgcolor=151b27&color=e6ebf2&data=https%3A%2F%2Fjjj4107.github.io%2Face-launcher%2F">
      <div class="wl-sub">폰 카메라로 QR 스캔 → 보기 전용 카탈로그</div>
    </div>
    <div class="side-foot">
      <b>v2026.06</b> · 내부 전용<br>
      문의 · <b>설계자동화팀</b>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <div class="topbar">
      <div class="hello">
        <h1>Plant Engineering Total Service System</h1>
        <p>사내 배관·철골·도면 자동화 도구 모음 · 실행할 도구를 선택하세요</p>
      </div>
      <div class="spacer"></div>
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9aa6bb" stroke-width="2">
          <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="도구 검색…  (예: 아이소, BOM, PSV, 스펙)" autocomplete="off"/>
      </div>
      <div class="userchip">
        <div class="avatar">JJ</div>
        <div><b style="font-size:12px">엔지니어</b><small>설계자동화팀</small></div>
      </div>
    </div>

    <!-- stats -->
    <div class="stats" id="stats"></div>

    <!-- sections rendered here -->
    <div id="content"></div>
    <div class="empty" id="empty">🔍 검색 결과가 없습니다.</div>
  </main>
</div>

<!-- modal -->
<div class="ov" id="ov">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"><span class="d"></span><span id="toast-t"></span></div>

<script>
/* ===================== DATA =====================
   프로젝트 단위 카드. status: run(운영중) / dev(개발중) / lab(실험)
   count = 주요 .py 스크립트 수 (백업/copy 제외)
==================================================*/
const CATS = [
  {id:"iso",     name:"아이소 도면 자동편집", ic:"📐"},
  {id:"arr",     name:"배치도/평면도 편집",   ic:"🗺️"},
  {id:"steel",   name:"철골 구조 변환",        ic:"🏗️"},
  {id:"conv",    name:"3D 모델·스펙 변환",     ic:"🔄"},
  {id:"support", name:"파이프 서포트",         ic:"🔧"},
  {id:"data",    name:"데이터시트/리스트",     ic:"📊"},
  {id:"util",    name:"계산·유틸리티",         ic:"🧰"},
];

const PROJECTS = [
  // ---- ISO ----
  {cat:"iso", ic:"📐", title:"E3D 아이소 자동편집", path:"ISO_AUTO_EDIT/ISO_AUTO_EDIT_FOR_E3D",
   entry:["E3D_ON_RUNTEST.PY","E3D_ON_RUNALLFOLD.PY"],
   status:"run", count:59,
   desc:"AVEVA E3D 아이소메트릭 DXF를 용접/치수/스풀/지지대 태그까지 25단계 파이프라인으로 자동 정리. 온라인(ON_) 변형 포함.",
   tags:["E3D","DXF","ezdxf","BOM","RUNALL"]},
  {cat:"iso", ic:"📐", title:"SP3D 아이소 자동편집", path:"ISO_AUTO_EDIT/ISO_AUTO_EDIT_FOR_SP3D",
   entry:["SP3D_ON_RUNTEST.PY"],
   status:"run", count:33,
   desc:"SmartPlant 3D 아이소 도면의 단열/치수/용접번호/엘보/고도 텍스트·아이템번호 회전 및 지지대 심볼을 일괄 보정.",
   tags:["SP3D","DXF","BOMFORM","SUPP"]},
  {cat:"iso", ic:"📐", title:"E3D-SA 아이소 편집", path:"ISO_AUTO_EDIT/ISO_AUTO_EDIT_FOR_E3DSA",
   entry:["SAE3D_ON_RUNTEST.PY"],
   status:"run", count:25,
   desc:"E3D Stress(SA) 전용 아이소 정리 — 티(TEE) 텍스트·스펙번호·플랜지 정보 삭제 등 SA 출력 규칙에 맞춘 11단계.",
   tags:["E3D-SA","TEE","SPEC"]},
  {cat:"iso", ic:"📐", title:"PDS 아이소 자동편집", path:"ISO_AUTO_EDIT/ISO_AUTO_EDIT_FOR_PDS",
   entry:["PDS_RUNTEST.PY"],
   status:"run", count:14,
   desc:"Intergraph PDS 아이소 DXF의 치수·아이템번호·용접번호·엘보 편집과 ISO BOM 엑셀 추출.",
   tags:["PDS","DXF","Excel"]},
  {cat:"iso", ic:"🧪", title:"ISO Updater (리팩터링)", path:"ISO_AUTO_EDIT/ISO UPDATE NEW",

  run:{cls:"b-run", label:"운영중"},
  dev:{cls:"b-dev", label:"개발중"},

/* ===================== RENDER ===================== */
const $ = s => document.querySelector(s);
let active = "all";
let query = "";

function totals(){
  const tools = PROJECTS.length;
  const scripts = PROJECTS.reduce((a,p)=>a+p.count,0);
  const cats = CATS.length;
  const run = PROJECTS.filter(p=>p.status==="run").length;
  return {tools,scripts,cats,run};
}

function renderStats(){
  const t = totals();
  $("#stats").innerHTML = `
    <div class="stat"><div class="k">등록 도구</div><div class="v">${t.tools}<small> 개</small></div><div class="d">프로젝트 단위 자동화 도구</div></div>
    <div class="stat"><div class="k">전체 스크립트</div><div class="v">${t.scripts}<small> 개</small></div><div class="d">주요 .py 파일 (백업 제외)</div></div>
    <div class="stat"><div class="k">카테고리</div><div class="v">${t.cats}<small> 분류</small></div><div class="d">업무 영역별 그룹</div></div>
    <div class="stat"><div class="k">운영중</div><div class="v" style="color:var(--ok)">${t.run}<small> 개</small></div><div class="d">현업 적용 완료</div></div>`;
}

function renderNav(){
  const counts = {};
  CATS.forEach(c=>counts[c.id]=PROJECTS.filter(p=>p.cat===c.id).length);
  let html = `<a data-c="all" class="${active==='all'?'active':''}"><span class="ic">▦</span>전체<span class="cnt">${PROJECTS.length}</span></a>`;
  html += CATS.map(c=>`<a data-c="${c.id}" class="${active===c.id?'active':''}"><span class="ic">${c.ic}</span>${c.name}<span class="cnt">${counts[c.id]}</span></a>`).join("");
  $("#nav").innerHTML = html;
  $("#nav").querySelectorAll("a").forEach(a=>a.onclick=()=>{active=a.dataset.c;renderNav();renderContent();});
}

function cardHTML(p){
  const s = STATUS[p.status];
  return `<div class="card" data-id="${p.path}">
    <div class="card-top">
      <div class="cico">${p.ic}</div>
      <div style="min-width:0">
        <h3>${p.title}</h3>
      </div>
      <span class="badge ${s.cls}">${s.label}</span>
    </div>
    <div class="desc">${p.desc}</div>
    <div class="card-foot">
      <span class="scount">▤ ${p.count} scripts</span>
      <button class="run">${p.entry?'실행 ▸':'열기 ▸'}</button>
    </div>
  </div>`;
}

function renderContent(){
  const q = query.trim().toLowerCase();
  const match = p => {
    if(active!=="all" && p.cat!==active) return false;
    if(!q) return true;
    return (p.title+" "+p.desc+" "+p.path+" "+p.tags.join(" ")).toLowerCase().includes(q);
  };
  const cats = active==="all" ? CATS : CATS.filter(c=>c.id===active);
  let html="";
  let any=false;
  cats.forEach(c=>{
    const list = PROJECTS.filter(p=>p.cat===c.id && match(p));
    if(!list.length) return;
    any=true;
    html += `<section class="sec">
      <div class="sec-h"><span class="dot"></span><h2>${c.ic} ${c.name}</h2>
        <span class="tag">${list.length} tools</span><span class="line"></span></div>
      <div class="grid">${list.map(cardHTML).join("")}</div>
    </section>`;
  });
  $("#content").innerHTML = html;
  $("#empty").classList.toggle("show", !any);
  $("#content").querySelectorAll(".card").forEach(card=>{
    card.onclick = ()=>openModal(card.dataset.id);
  });
}

// 런처 서버(server.py)가 이 페이지를 서빙 중인지 판별.
// localhost / 사내 LAN IP 일 때만 서버 모드(실행 가능). 그 외(file://, github.io 등)는 보기 전용.
const _host = location.hostname;
const _isLocal = _host==="localhost" || _host==="127.0.0.1" ||
  /^192\.168\./.test(_host) || /^10\./.test(_host) ||
  /^172\.(1[6-9]|2[0-9]|3[01])\./.test(_host);
const SERVED = (location.protocol==="http:"||location.protocol==="https:") && _isLocal;

async function openModal(id){
  const p = PROJECTS.find(x=>x.path===id);
  if(!p) return;
  const s = STATUS[p.status];
  $("#modal").innerHTML = `
    <div class="m-h">
      <div class="cico">${p.ic}</div>
      <div style="min-width:0"><h3>${p.title}</h3><div class="sub">${p.path}</div></div>
      <button class="m-x" id="mx">✕</button>
    </div>
    <div class="m-b">
      <p>${p.desc}</p>
      <div class="m-meta">
        <div><div class="k">상태</div><div class="v" style="color:var(--accent)">${s.label}</div></div>
        <div><div class="k">스크립트</div><div class="v">${p.count} 개</div></div>
        <div><div class="k">카테고리</div><div class="v" style="font-size:12px">${CATS.find(c=>c.id===p.cat).name}</div></div>
        <div><div class="k">실행 환경</div><div class="v" style="font-size:12px">Python 3.x</div></div>
      </div>
      <div class="m-row">${p.tags.map(t=>`<span class="chip">${t}</span>`).join("")}</div>
      <div class="m-sub-h">${p.entry?(SERVED?'⚡ 대표 실행 (한 번에 전체 구동)':'⚡ 대표 스크립트'):(SERVED?'▤ 실행할 스크립트':'▤ 구성 스크립트')} <span id="m-cnt"></span></div>
      ${(p.entry&&SERVED)?`<div class="oneclick">이 폴더는 아래 대표 스크립트 하나로 전체 파이프라인이 실행됩니다. (전체 ${p.count}개 단계 포함)</div>`:''}
      ${!SERVED?`<div class="oneclick" style="background:rgba(91,140,255,.08);border-color:rgba(91,140,255,.25)">📱 보기 전용 모드입니다. 실제 실행은 PC 런처(런처.bat)에서만 동작합니다.</div>`:''}
      <div class="filelist" id="filelist"></div>
    </div>
    <div class="m-f">
      <button class="btn" id="mc">닫기</button>
    </div>`;
  $("#ov").classList.add("show");
  $("#mx").onclick = $("#mc").onclick = closeModal;

  if(SERVED) loadScripts(p);
  else renderViewOnly(p);
}

// 서버 없이(폰/OneDrive 등) 열렸을 때 — 실행 없이 대표 스크립트만 표시
function renderViewOnly(p){
  const box = $("#filelist");
  const list = (p.entry && p.entry.length) ? p.entry : null;
  if(list){
    $("#m-cnt").textContent = `(${list.length})`;
    box.innerHTML = list.map(n=>`<div class="frow"><span class="fname">${n}</span><span class="viewtag">보기 전용</span></div>`).join("");
  } else {
    $("#m-cnt").textContent = "";
    box.innerHTML = `<div class="floading">여러 개의 독립 도구로 구성된 폴더입니다.<br>스크립트 목록·실행은 PC 런처에서 확인하세요.</div>`;
  }
}

async function loadScripts(p){
  const box = $("#filelist");
  try{
    const r = await fetch("/api/scripts?path=" + encodeURIComponent(p.path));
    const d = await r.json();
    if(!d.ok){ renderViewOnly(p); return; }
    let list = d.scripts;
    // entry 지정 시 대표 스크립트만 (대소문자 무시)
    if(p.entry && p.entry.length){
      const want = p.entry.map(e=>e.toLowerCase());
      const filtered = list.filter(f=>want.includes(f.name.toLowerCase()));
      if(filtered.length) list = filtered;   // 못 찾으면 전체 표시(안전장치)
    }
    $("#m-cnt").textContent = `(${list.length})`;
    if(!list.length){ box.innerHTML = `<div class="floading">실행할 .py 파일이 없습니다.</div>`; return; }
    // 하위폴더(sub)별 그룹
    const groups = {};
    list.forEach(f=>{ (groups[f.sub] ||= []).push(f); });
    let html = "";
    Object.keys(groups).forEach(sub=>{
      if(sub) html += `<div class="fgroup">▸ ${sub}/</div>`;
      groups[sub].forEach(f=>{
        html += `<div class="frow">
          <span class="fname" title="${f.rel}">${f.name}</span>
          <button class="frun" data-rel="${encodeURIComponent(f.rel)}">실행 ▸</button>
        </div>`;
      });
    });
    box.innerHTML = html;
    box.querySelectorAll(".frun").forEach(b=>{
      b.onclick = ()=>runScript(decodeURIComponent(b.dataset.rel), b);
    });
  }catch(e){
    renderViewOnly(p);   // 서버 응답 없음 → 보기 전용으로 폴백
  }
}

async function runScript(rel, btn){
  const old = btn.textContent;
  btn.textContent = "실행 중…"; btn.disabled = true;
  try{
    const r = await fetch("/api/run", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({file: rel})
    });
    const d = await r.json();
    toast(d.ok ? ("▸ " + d.message) : ("✕ " + (d.message||"실행 실패")));
    btn.textContent = d.ok ? "✓ 실행됨" : "재시도";
    setTimeout(()=>{ btn.textContent = old; btn.disabled = false; }, 1600);
  }catch(e){
    toast("✕ 서버 통신 오류");
    btn.textContent = old; btn.disabled = false;
  }
}

}
